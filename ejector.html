<script>
/* =========================================================
   EJECTOR Script (Safe / Normalized)
   - 一括追加の timeline 登録不具合を修正
   - doneDates/customDays/deletedDates 等の欠損を正規化
   - includes/push 前提で壊れないよう安全化
   ========================================================= */

// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const DAYS_JP = ['日','月','火','水','木','金','土'];

const DEVICE_ID = (() => {
  let id = localStorage.getItem('ejector_deviceId');
  if (!id) {
    id = Math.random().toString(36).substr(2, 9);
    localStorage.setItem('ejector_deviceId', id);
  }
  return id;
})();

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentDayOffset = 0;
let editingTaskId = null;
let currentRange = { start: 540, end: 1440, workEndMin: 1110 };

const DEFAULT_TASKS = [
  { id: 1, title: '起床', start: 420, duration: 30, allocated: true, repeatMode: 'daily', customDays: [], doneDates: [], deletedDates: [], isWakeUp: true, taskType: 'task' },
  { id: 2, title: '就寝', start: 1380, duration: 60, allocated: true, repeatMode: 'daily', customDays: [], doneDates: [], deletedDates: [], isSleep: true, taskType: 'task' },
];

const state = {
  tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS))
};

// ══════════════════════════════════════════════
//  正規化（重要）
// ══════════════════════════════════════════════
function normalizeTask(t) {
  if (!t || typeof t !== 'object') return t;

  // 配列系
  t.doneDates    = Array.isArray(t.doneDates)    ? t.doneDates    : [];
  t.customDays   = Array.isArray(t.customDays)   ? t.customDays   : [];
  t.deletedDates = Array.isArray(t.deletedDates) ? t.deletedDates : [];
  t.subtasks     = Array.isArray(t.subtasks)     ? t.subtasks     : [];

  // オブジェクト系
  t.overrides = (t.overrides && typeof t.overrides === 'object') ? t.overrides : {};

  // 基本フィールド
  t.repeatMode = (typeof t.repeatMode === 'string' && t.repeatMode) ? t.repeatMode : 'none';
  t.taskType   = (t.taskType === 'event' || t.taskType === 'task') ? t.taskType : 'task';
  t.allocated  = (typeof t.allocated === 'boolean') ? t.allocated : false;

  // start/duration の最低保証
  if (t.duration == null || isNaN(parseInt(t.duration))) t.duration = 30;
  if (t.allocated && (t.start == null || isNaN(parseInt(t.start)))) t.start = 540;

  return t;
}

function normalizeAllTasks() {
  state.tasks = (Array.isArray(state.tasks) ? state.tasks : []).map(normalizeTask);
}

function safeIncludes(arr, v) {
  return Array.isArray(arr) ? arr.includes(v) : false;
}

// ══════════════════════════════════════════════
//  DATE KEY ユーティリティ
// ══════════════════════════════════════════════
function offsetToDateKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function migrateTaskDates() {
  const isOldFormat = (v) => typeof v === 'number' && Math.abs(v) < 1000;
  let changed = false;

  state.tasks.forEach(task => {
    normalizeTask(task);

    if (task.doneDates) {
      task.doneDates = task.doneDates.map(v => {
        if (isOldFormat(v)) { changed = true; return offsetToDateKey(v); }
        return v;
      });
    }
    if (task.deletedDates) {
      task.deletedDates = task.deletedDates.map(v => {
        if (isOldFormat(v)) { changed = true; return offsetToDateKey(v); }
        return v;
      });
    }
    if (task.overrides) {
      const newOv = {};
      Object.entries(task.overrides).forEach(([k, v]) => {
        const kk = parseInt(k);
        if (isOldFormat(kk)) {
          changed = true;
          newOv[offsetToDateKey(kk)] = v;
        } else {
          newOv[k] = v;
        }
      });
      task.overrides = newOv;
    }
    if (task.allocatedOffset !== undefined && isOldFormat(task.allocatedOffset)) {
      task.allocatedOffset = offsetToDateKey(task.allocatedOffset);
      changed = true;
    }
    if (task.createdOffset !== undefined && isOldFormat(task.createdOffset)) {
      task.createdOffset = offsetToDateKey(task.createdOffset);
      changed = true;
    }
  });

  if (changed) saveToLocal();
}

function migrateWorkBoundaryTitles() {
  let changed = false;
  state.tasks.forEach(task => {
    normalizeTask(task);
    if (task.title === '業務開始') { task.title = '起床'; task.isWakeUp = true; delete task.isWorkStart; if (task.repeatMode === 'weekday') task.repeatMode = 'daily'; changed = true; }
    else if (task.title === '定時') { task.title = '就寝'; task.isSleep = true; delete task.isWorkEnd; if (task.repeatMode === 'weekday') task.repeatMode = 'daily'; changed = true; }
    if (task.isWorkStart) { task.isWakeUp = true; delete task.isWorkStart; changed = true; }
    if (task.isWorkEnd)   { task.isSleep  = true; delete task.isWorkEnd;   changed = true; }
  });
  if (changed) saveToLocal();
}

// ══════════════════════════════════════════════
//  Local Storage
// ══════════════════════════════════════════════
function saveToLocal() {
  normalizeAllTasks();
  localStorage.setItem('ejector_tasks', JSON.stringify(state.tasks));
}

function loadFromLocal() {
  try {
    const s = localStorage.getItem('ejector_tasks');
    if (s) state.tasks = JSON.parse(s);
  } catch(e) {
    state.tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  }
  normalizeAllTasks();
}

// PJ色（今回は無効のまま）
function getProjectColor(projectName) { return null; }

// ══════════════════════════════════════════════
//  Cloudflare Workers KV 同期
// ══════════════════════════════════════════════
let syncCfg = { workerUrl: '', secret: '' };
let lastPushTime = parseInt(localStorage.getItem('ejector_lastPush') || '0');
let syncStatusVal = 'off';
let isSyncing = false;

function loadSyncConfig() {
  syncCfg.workerUrl = localStorage.getItem('ejector_workerUrl') || '';
  syncCfg.secret    = localStorage.getItem('ejector_secret')    || '';
}

function cfHeaders(extra = {}) {
  const h = { 'Content-Type': 'application/json' };
  if (syncCfg.secret) h['X-Secret'] = syncCfg.secret;
  return { ...h, ...extra };
}

async function pullFromBin() {
  if (!syncCfg.workerUrl || isSyncing) return;
  try {
    const res = await fetch(syncCfg.workerUrl, { headers: cfHeaders() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const record = await res.json();

    if (!record || !record.tasks || !Array.isArray(record.tasks)) {
      await pushToBin();
      return;
    }

    const remoteTime   = record.updatedAt || 0;
    const remoteDevice = record.deviceId  || '';

    if (remoteDevice !== DEVICE_ID && remoteTime > lastPushTime) {
      state.tasks = record.tasks;
      normalizeAllTasks();               // ★重要
      saveToLocal();
      renderAll();
    }
    showSyncStatus('ok');
  } catch(e) {
    console.error('CF Workers pull error:', e);
    showSyncStatus('error', e.message);
  }
}

async function pushToBin() {
  if (!syncCfg.workerUrl) return;
  if (isSyncing) return;
  isSyncing = true;
  showSyncStatus('syncing');
  const now = Date.now();

  try {
    normalizeAllTasks(); // ★送信前に正規化
    const res = await fetch(syncCfg.workerUrl, {
      method: 'PUT',
      headers: cfHeaders(),
      body: JSON.stringify({ tasks: state.tasks, deviceId: DEVICE_ID, updatedAt: now })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    lastPushTime = now;
    localStorage.setItem('ejector_lastPush', String(now));
    showSyncStatus('ok');
  } catch(e) {
    console.error('CF Workers push error:', e);
    showSyncStatus('error');
  } finally {
    isSyncing = false;
  }
}

function saveState() {
  saveToLocal();
  pushToBin();
}

function showSyncStatus(status, errMsg) {
  syncStatusVal = status;
  const btn = document.getElementById('syncBtn');
  const colors  = { off:'var(--ink3)', syncing:'var(--blue)', ok:'var(--green)', error:'var(--red)' };
  const borders = { off:'var(--border)', syncing:'var(--blue)', ok:'var(--green)', error:'var(--red)' };
  if (btn) {
    btn.innerHTML = '☁';
    btn.style.color = colors[status];
    btn.style.borderColor = borders[status] || 'var(--border)';
  }

  const badge = document.getElementById('syncStatusBadge');
  if (badge) {
    const baseLabels = { off:'⊘ 未接続', syncing:'↻ 同期中...', ok:'✓ 接続済み', error:'✗ 接続エラー' };
    badge.textContent = baseLabels[status] + (errMsg ? `（${errMsg}）` : '');
    badge.className = `sync-badge ${status}`;
  }
}

// ══════════════════════════════════════════════
//  Notion（あなたの既存UIに合わせて最低限維持）
//  ※ここも取り込み後 normalizeAllTasks() を必ず通す
// ══════════════════════════════════════════════
let notionCfg = {
  pageId: '',
  databaseId: '',
};

function loadNotionConfig() {
  notionCfg.pageId     = localStorage.getItem('ejector_notionPageId') || '';
  notionCfg.databaseId = localStorage.getItem('ejector_notionDbId') || '';
}

function showNotionStatus(status, msg) {
  const badge = document.getElementById('notionStatusBadge');
  if (!badge) return;
  const labels = { off:'⊘ 未接続', syncing:'↻ 同期中...', ok:'✓ 接続済み', error:'✗ エラー' };
  const colors = {
    off:'var(--bg3)',
    syncing:'var(--blue-dim)',
    ok:'var(--green-dim)',
    error:'rgba(192,57,43,0.12)',
  };
  badge.textContent = (labels[status] || status) + (msg ? `（${msg}）` : '');
  badge.style.background = colors[status] || 'var(--bg3)';

  const isConnected = (status === 'ok');
  const form    = document.getElementById('notionConnectForm');
  const actions = document.getElementById('notionConnectedActions');
  if (form)    form.style.display    = isConnected ? 'none' : 'block';
  if (actions) actions.style.display = isConnected ? 'flex' : 'none';
}

// connectNotion/syncNotion などはあなたのWorker側実装に依存するため、
// ここでは “取り込み後 normalize” を徹底するのみに留めます。
// （あなたの既存のNotion関数を使う場合も、最後に normalizeAllTasks() を必ず呼んでください）

// ══════════════════════════════════════════════
//  LOGIC
// ══════════════════════════════════════════════
function isRepeatMatchDay(task, offset) {
  normalizeTask(task);
  if (task.repeatMode === 'daily') return true;

  const d = new Date();
  d.setDate(d.getDate() + offset);
  const dow = d.getDay();

  if (task.repeatMode === 'weekday')   return dow >= 1 && dow <= 5;
  if (task.repeatMode === 'weekend')   return dow === 0 || dow === 6;
  if (task.repeatMode === 'custom')    return Array.isArray(task.customDays) && task.customDays.includes(dow);
  if (task.repeatMode === 'month-end') {
    const next = new Date(d); next.setDate(d.getDate() + 1);
    return next.getDate() === 1;
  }
  return false;
}

function isTaskForToday(task, offset) {
  normalizeTask(task);
  const dk = offsetToDateKey(offset);

  if (safeIncludes(task.deletedDates, dk)) return false;
  if (!task.allocated) return false;

  const created = (task.createdOffset !== undefined) ? task.createdOffset : 0;
  if (dk < created) return false;

  if (task.repeatMode === 'none') {
    const ao = (task.allocatedOffset !== undefined) ? task.allocatedOffset : offsetToDateKey(0);
    return ao === dk;
  }

  if (task.repeatMode === 'daily') return true;

  const d = new Date();
  d.setDate(d.getDate() + offset);
  const dow = d.getDay();

  if (task.repeatMode === 'weekday') return dow >= 1 && dow <= 5;
  if (task.repeatMode === 'weekend') return dow === 0 || dow === 6;
  if (task.repeatMode === 'custom')  return Array.isArray(task.customDays) && task.customDays.includes(dow);
  if (task.repeatMode === 'month-end') {
    const next = new Date(d); next.setDate(d.getDate() + 1);
    return next.getDate() === 1;
  }
  return false;
}

function getTaskStart(task, offset) {
  normalizeTask(task);
  const dk = offsetToDateKey(offset);
  if (task.overrides && task.overrides[dk] && task.overrides[dk].start !== undefined) {
    return task.overrides[dk].start;
  }
  return task.start;
}

/** ★ バーチカルは起床〜就寝まで */
function getTimelineRange(dayTasks) {
  const workStart = dayTasks.find(t => t.isWakeUp || (t.title||'').includes('起床'));
  const workEnd   = dayTasks.find(t => t.isSleep  || (t.title||'').includes('就寝'));
  const latestTask = dayTasks.reduce((max, t) => Math.max(max, (t.start||0) + (t.duration||0)), 0);
  const workEndMin = workEnd ? workEnd.start + workEnd.duration : 1080;
  const rangeEnd   = Math.max(workEndMin + 60, latestTask + 30);
  return {
    start: workStart ? workStart.start : 540,
    end:   Math.min(rangeEnd, 1440),
    workEndMin
  };
}

// ══════════════════════════════════════════════
//  RENDER（あなたの既存HTMLを前提に最小限）
//  ※ここでは「描画」そのものより “登録/完了/一括追加” 修正が目的なので
//    renderTimeline/renderLaterList はあなたの既存のものを使ってもOK。
//    ただし includes を安全化したいなら safeIncludes を使ってください。
// ══════════════════════════════════════════════

// ここではあなたの元コード互換で呼ばれている関数だけ最低限定義します。
// 実運用では、あなたの元の renderTimeline/renderLaterList/renderAll を残してもOKです。

function renderTimeline(dayTasks, range) {
  // あなたの元実装が巨大なので、ここは “元の関数を残す運用” を推奨。
  // もしこの置換版をそのまま使うなら、元のrenderTimelineをここに貼り付けてください。
  // （本回答は “登録/完了ができない” の修正が目的のため省略）
}

function renderLaterList() {
  // 同上：元のrenderLaterListを使う場合は、内部の t.doneDates.includes を
  // safeIncludes(t.doneDates, dk) に変えるだけで安全化できます。
}

function renderWeekNav() {}
function updateDateDisplay() {}

function renderAll() {
  recyclePastTasks();
  normalizeAllTasks();

  const dayTasks = state.tasks.filter(t => isTaskForToday(t, currentDayOffset))
    .map(t => ({...t, start: getTaskStart(t, currentDayOffset)}));

  currentRange = getTimelineRange(dayTasks);

  // あなたの既存描画関数があるならそれを呼び出してください
  // ここでは存在しない場合でも落ちないようにガード
  try { if (typeof window._renderTimelineOriginal === 'function') window._renderTimelineOriginal(dayTasks, currentRange); } catch {}
  try { if (typeof window._renderLaterListOriginal === 'function') window._renderLaterListOriginal(); } catch {}

  // もし元関数がそのまま存在するならそちらを呼ぶ
  try { if (typeof window.renderTimeline === 'function' && window.renderTimeline !== renderTimeline) window.renderTimeline(dayTasks, currentRange); } catch {}
  try { if (typeof window.renderLaterList === 'function' && window.renderLaterList !== renderLaterList) window.renderLaterList(); } catch {}

  try { updateDateDisplay(); } catch {}
  try { renderWeekNav(); } catch {}
}

// ══════════════════════════════════════════════
//  ACTIONS：追加 / 一括追加（修正版）
// ══════════════════════════════════════════════
function toggleRepeatUI(val, id = 'customDays') {
  const el = document.getElementById(id);
  if (el) el.style.display = (val === 'custom') ? 'block' : 'none';
}

function onPlacementChange(val) {
  const hidden = document.getElementById('taskPlacement');
  if (hidden) hidden.value = val;
  const timeBox = document.getElementById('addTimeBox');
  if (timeBox) timeBox.style.display = (val === 'timeline') ? 'block' : 'none';
}

function setTaskType(type) {
  const input = document.getElementById('taskType');
  if (input) input.value = type;
}

function addTask() {
  const title = document.getElementById('taskTitle')?.value?.trim();
  const dur = parseInt(document.getElementById('taskDur')?.value) || 30;
  const repeatMode = document.getElementById('taskRepeatMode')?.value || 'none';
  const placement = document.getElementById('taskPlacement')?.value || 'timeline';
  if (!title) return;

  const customDays = [];
  if (repeatMode === 'custom') {
    document.querySelectorAll('#customDays input:checked').forEach(i => customDays.push(parseInt(i.value)));
  }

  const dk = offsetToDateKey(currentDayOffset);
  const taskType = document.getElementById('taskType')?.value || 'task';
  const project  = document.getElementById('addProject')?.value?.trim() || undefined;
  const priority = document.getElementById('addPriority')?.value || undefined;
  const todayFlag = !!document.getElementById('addTodayFlag')?.checked;

  const dueDateRaw = document.getElementById('addDueDate')?.value;
  const dueDate = dueDateRaw ? parseInt(dueDateRaw.replace(/-/g, '')) : undefined;

  const newTask = normalizeTask({
    id: Date.now(),
    title,
    duration: dur,
    allocated: false,
    repeatMode,
    customDays,
    doneDates: [],
    deletedDates: [],
    createdOffset: dk,
    taskType,
    ...(project ? {project} : {}),
    ...(priority ? {priority} : {}),
    ...(todayFlag ? {todayFlag:true} : {}),
    ...(dueDate ? {dueDate} : {}),
    ...(title.includes('起床') ? {isWakeUp:true} : {}),
    ...(title.includes('就寝') ? {isSleep:true} : {}),
  });

  if (placement === 'timeline') {
    const ah = parseInt(document.getElementById('addTimeH')?.value) || 8;
    const am = parseInt(document.getElementById('addTimeM')?.value) || 0;
    newTask.allocated = true;
    newTask.start = ah * 60 + am;
    if (repeatMode === 'none') newTask.allocatedOffset = dk;
  } else {
    newTask.allocated = false;
  }

  state.tasks.push(newTask);
  saveState();
  renderAll();
}

// ★修正ポイント：bulkのtimeline登録を単発でも効くようにする
function addBulkTasks() {
  const raw = document.getElementById('bulkInput')?.value || '';
  const repeatMode = document.getElementById('bulkRepeatMode')?.value || 'none';
  const placement  = document.getElementById('bulkPlacement')?.value || 'later';
  const todayFlag  = !!document.getElementById('bulkTodayFlag')?.checked;

  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return;

  const dk = offsetToDateKey(currentDayOffset);
  let added = 0;

  lines.forEach(line => {
    const parts = line.split(',').map(s => s.trim());
    const title = parts[0];
    if (!title) return;

    const dur = parseInt(parts[1]) || 30;
    const project  = parts[2] || undefined;
    const priority = ['high','mid','low'].includes(parts[3]) ? parts[3] : undefined;

    const t = normalizeTask({
      id: Date.now() + added,
      title,
      duration: dur,
      allocated: false,
      repeatMode,
      customDays: [],
      doneDates: [],
      deletedDates: [],
      createdOffset: dk,
      taskType: 'task',
      ...(project ? {project} : {}),
      ...(priority ? {priority} : {}),
      ...(todayFlag ? {todayFlag:true} : {}),
    });

    // ★ここが修正：placement=timelineなら repeatMode に関係なく allocated=true
    if (placement === 'timeline') {
      t.allocated = true;
      t.start = 540; // デフォルト9時（必要ならUI追加）
      if (repeatMode === 'none') t.allocatedOffset = dk;
    }

    state.tasks.push(t);
    added++;
  });

  document.getElementById('bulkInput').value = '';
  if (document.getElementById('bulkTodayFlag')) document.getElementById('bulkTodayFlag').checked = false;

  saveState();
  renderAll();
}

// ══════════════════════════════════════════════
//  完了（安全化）
// ══════════════════════════════════════════════
function toggleDone(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  normalizeTask(task);

  const dk = offsetToDateKey(currentDayOffset);
  const idx = task.doneDates.indexOf(dk);

  if (idx > -1) {
    task.doneDates.splice(idx, 1);
    if (task._origDuration !== undefined) {
      task.duration = task._origDuration;
      delete task._origDuration;
    }
  } else {
    task.doneDates.push(dk);
    // ※あなたの「早く終わったらduration短縮」ロジックは好みが分かれるので
    //   ここでは “壊れない” こと優先で、repeatModeに関わらず元ロジックを維持したい場合は追加してください。
  }

  saveState();
  renderAll();
}

// ══════════════════════════════════════════════
//  過去日の単発配置をリストへ戻す（あなたの元ロジック維持）
// ══════════════════════════════════════════════
function recyclePastTasks() {
  const todayDk = offsetToDateKey(0);
  let changed = false;

  state.tasks.forEach(task => {
    normalizeTask(task);
    if (
      task.repeatMode === 'none' &&
      task.allocated &&
      task.allocatedOffset !== undefined &&
      task.allocatedOffset < todayDk
    ) {
      const doneOnDay = task.doneDates && task.doneDates.includes(task.allocatedOffset);
      if (doneOnDay) return;
      task.allocated = false;
      changed = true;
    }
  });

  if (changed) saveToLocal();
}

// ══════════════════════════════════════════════
//  clock / init
// ══════════════════════════════════════════════
let _lastMinute = -1;
function updateClock() {
  const clock = document.getElementById('clock');
  const now = new Date();
  if (clock) clock.textContent = now.toTimeString().split(' ')[0];

  const min = now.getHours() * 60 + now.getMinutes();
  if (min !== _lastMinute) _lastMinute = min;
}

function goToday(){ currentDayOffset = 0; renderAll(); }
function changeDate(dir){ currentDayOffset += dir; renderAll(); }
function switchTab(tab){ /* あなたの元実装を残す運用推奨 */ }
async function manualPull(){ await pullFromBin(); }

window.onload = async () => {
  loadFromLocal();
  migrateTaskDates();
  migrateWorkBoundaryTitles();

  loadSyncConfig();
  loadNotionConfig();

  if (syncCfg.workerUrl) {
    showSyncStatus('syncing');
    await pullFromBin();
  }

  normalizeAllTasks();
  renderAll();

  setInterval(updateClock, 1000);
  updateClock();
};

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) pullFromBin();
});
</script>
